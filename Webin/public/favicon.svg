<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft Background Container -->
  <rect width="128" height="128" rx="30" fill="#E8EEFF"/>
  
  <!-- Bold Stylized W -->
  <g transform="translate(20, 35)">
    <!-- The Heavy W Path -->
    <path d="M8 5 L26 52 L44 18 L62 52 L80 5" 
          stroke="#0044FF" 
          stroke-width="14" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
    
    <!-- Bold Graduation Cap (Right Peak) -->
    <path d="M68 -6 L90 5 L78 16 L56 5 Z" fill="#0033CC" />
    <path d="M90 5 V20" stroke="#00C2FF" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Bold Left Bracket (Coding Symbol) -->
    <path d="M2 12 L-8 28 L2 44" 
          stroke="#00C2FF" 
          stroke-width="6" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
  </g>
</svg>